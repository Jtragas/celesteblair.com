<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Gallery — Celeste Blair</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Libre+Franklin:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --warm-gray: #B8AFA6;
    --charcoal: #2D2926;
    --soft-blue: #A7C4D4;
    --dusty-rose: #D4A6A6;
    --sage: #A6B8A0;
    --gold: #C9A96E;
    --light-blue: #D0E1EC;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Libre Franklin', sans-serif;
    background: var(--cream);
    color: var(--charcoal);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 15% 20%, rgba(167,196,212,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 75%, rgba(212,166,166,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(166,184,160,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  .back-link {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    color: var(--warm-gray);
    margin-bottom: 40px;
    transition: color 0.3s ease;
    animation: fadeUp 1s ease-out both;
  }
  .back-link:hover { color: var(--gold); }
  .back-link svg { width: 16px; height: 16px; }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2rem, 5vw, 3.2rem);
    letter-spacing: 0.08em;
    color: var(--charcoal);
    margin-bottom: 8px;
    animation: fadeUp 1s ease-out 0.1s both;
  }

  .page-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: var(--warm-gray);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
    animation: fadeUp 1s ease-out 0.2s both;
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin-bottom: 40px;
    animation: fadeUp 1s ease-out 0.3s both;
  }

  .gallery-section {
    width: 100%;
    max-width: 900px;
    margin-bottom: 48px;
    animation: fadeUp 1s ease-out 0.4s both;
  }
  .gallery-label {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--warm-gray);
    text-align: center;
    margin-bottom: 24px;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }
  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    cursor: pointer;
    aspect-ratio: 1;
    background: rgba(255,255,255,0.4);
  }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease, filter 0.5s ease;
  }
  .gallery-item:hover img {
    transform: scale(1.08);
    filter: brightness(0.85);
  }
  .art-title {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 10px 12px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.9rem;
    color: white;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.4s ease;
  }
  .gallery-item:hover .art-title {
    opacity: 1;
    transform: translateY(0);
  }

  .lightbox {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(20,18,16,0.92);
    backdrop-filter: blur(12px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: pointer;
    padding: 40px;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 90%;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.5);
    animation: lbZoom 0.35s ease both;
  }
  .lightbox .lb-title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: rgba(250,247,242,0.85);
    margin-top: 20px;
    letter-spacing: 0.04em;
  }
  .lightbox .lb-close {
    position: absolute;
    top: 24px;
    right: 28px;
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(250,247,242,0.5);
    cursor: pointer;
    transition: color 0.3s ease;
  }
  .lightbox .lb-close:hover { color: var(--gold); }
  @keyframes lbZoom {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }

  .footer {
    font-family: 'Libre Franklin', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(184,175,166,0.6);
    animation: fadeUp 1s ease-out 0.5s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .gallery-grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
  }
</style>
</head>

<script>
  document.querySelectorAll('.gallery-item').forEach(item => {
    item.addEventListener('click', () => {
      const img = item.querySelector('img');
      const title = item.querySelector('.art-title');
      document.getElementById('lb-img').src = img.src;
      document.getElementById('lb-img').alt = img.alt;
      document.getElementById('lb-title').textContent = title.textContent;
      document.getElementById('lightbox').classList.add('active');
      document.body.style.overflow = 'hidden';
    });
  });

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
